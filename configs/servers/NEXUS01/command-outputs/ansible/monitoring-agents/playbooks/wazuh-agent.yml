---

- hosts: wazuh_agents
  become: yes
  become_user: root

  roles:
    - ansible-wazuh-agent

  vars:
    wazuh_managers:
      - address: 10.10.10.50
        port: 1514
        protocol: tcp
        api_port: 55000
        api_proto: 'https'
        api_user: wazuh
        max_retries: 5
        retry_interval: 5

    wazuh_agent_authd:
      enable: true
      registration_address: 10.10.10.50
      port: 1515
      ssl_agent_ca: null
      ssl_auto_negotiate: "no"