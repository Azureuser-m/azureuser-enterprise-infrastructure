---
- name: Deploy Zabbix Agent 2
  hosts: zabbix_agents
  become: true

  vars:
    zabbix_server_ip: "10.10.10.40"
    zabbix_major: "7.4"

    # Variables for official zabbix.zabbix.agent role
    agent_variant: 2
    agent_major_version: "{{ zabbix_major }}"
    agent_param_server: "{{ zabbix_server_ip }}"
    agent_param_serveractive: "{{ zabbix_server_ip }}"
    agent_param_hostname: "{{ inventory_hostname }}"
    agent_param_hostmetadata: "linux-servers"

    # Debian 13 package URL
    zabbix_release_package: "zabbix-release_latest_{{ zabbix_major }}+debian13_all.deb"
    zabbix_release_url: "https://repo.zabbix.com/zabbix/{{ zabbix_major }}/release/debian/pool/main/z/zabbix-release/{{ zabbix_release_package }}"

  tasks:
    - name: Use official Zabbix role for supported OS versions
      ansible.builtin.include_role:
        name: zabbix.zabbix.agent
      when:
        - not (ansible_distribution == "Debian" and ansible_distribution_major_version == "13")

    - name: Install Zabbix Agent 2 manually on Debian 13
      when:
        - ansible_distribution == "Debian"
        - ansible_distribution_major_version == "13"
      block:
        - name: Install required packages
          ansible.builtin.apt:
            name:
              - wget
              - ca-certificates
              - gnupg
            state: present
            update_cache: true

        - name: Download Zabbix repository package for Debian 13
          ansible.builtin.get_url:
            url: "{{ zabbix_release_url }}"
            dest: "/tmp/{{ zabbix_release_package }}"
            mode: "0644"

        - name: Install Zabbix repository package
          ansible.builtin.apt:
            deb: "/tmp/{{ zabbix_release_package }}"

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true

        - name: Install Zabbix Agent 2
          ansible.builtin.apt:
            name: zabbix-agent2
            state: present

        - name: Configure Zabbix Agent 2
          ansible.builtin.template:
            src: ../templates/zabbix_agent2.conf.j2
            dest: /etc/zabbix/zabbix_agent2.conf
            owner: root
            group: root
            mode: "0644"
          notify: Restart zabbix-agent2

        - name: Enable and start Zabbix Agent 2
          ansible.builtin.systemd:
            name: zabbix-agent2
            enabled: true
            state: started

  handlers:
    - name: Restart zabbix-agent2
      ansible.builtin.systemd:
        name: zabbix-agent2
        state: restarted
